name: student_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.4.0
  firebase_storage: ^12.0.0

  cupertino_icons: ^1.0.8
  go_router: ^17.1.0
  flutter_bloc: ^9.1.1
  injectable: ^2.7.1+4
  get_it: ^9.2.1
  freezed: ^3.2.5
  json_serializable: ^6.13.1
  dio: ^5.9.2
  shared_preferences: ^2.5.4
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  bloc: ^9.2.0
  flutter_dotenv: ^5.1.0
  google_sign_in: ^6.2.1
  flutter_native_splash: ^2.4.7
  image_picker: ^1.1.2
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter_native_splash:
  color: "#FFFFFF"
  color_dark: "#FFFFFF"
  android_12:
    color: "#FFFFFF"

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.jpg"
  min_sdk_android: 21
  adaptive_icon_background: "#6C47FF"
  adaptive_icon_foreground: "assets/icon/icon.jpg"

flutter:
  uses-material-design: true

  assets:
    - assets/icon/